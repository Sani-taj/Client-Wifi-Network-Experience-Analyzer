<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WiFi Network Analyser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="container split">
  <!-- Left -->
  <div class="left">
    <h2>📶 WiFi Network Analyser</h2>
    <h1>Real-time network quality intelligence</h1>
    <p>Monitor WiFi QoE metrics, detect root causes of degradation.</p>

    <ul>
      <li>📈 Live latency & throughput monitoring</li>
      <li>📡 QoE scoring with thresholds</li>
      <li>🛡 Automated root cause analysis</li>
    </ul>
  </div>

  <!-- Right -->
  <div class="right">
    <h2>Sign in</h2>

    <input type="text" placeholder="Username" id="username">
    <input type="password" placeholder="Password" id="password">

    <button onclick="login()">Sign In</button>
    <p>Don't have account? Create one</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
